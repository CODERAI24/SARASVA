<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarasva</title>
    <!-- Force-update: kill old SW and reload so new version loads from network -->
    <script>
      (function() {
        var BUST_KEY = 'sw_bust_v6';
        if ('serviceWorker' in navigator && !sessionStorage.getItem(BUST_KEY)) {
          sessionStorage.setItem(BUST_KEY, '1');
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length === 0) return;
            Promise.all(regs.map(function(r) { return r.unregister(); }))
              .then(function() { window.location.reload(true); });
          });
        }
        // After bust: listen for future controller changes and reload
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            window.location.reload();
          });
        }
      })();
    </script>
    <meta name="description" content="Academic tracker — attendance, exams, timetable &amp; tasks" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="icon" href="/SARASVA/favicon.ico" sizes="any" />
    <link rel="icon" href="/SARASVA/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/SARASVA/apple-touch-icon-180x180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
