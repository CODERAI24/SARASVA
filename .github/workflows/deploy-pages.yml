name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sarasva-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sarasva-frontend

      - name: Build
        run: npm run build
        working-directory: sarasva-frontend
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCe85WvMIdGqpB4fQ-5l4c46fikr-EwO5s
          VITE_FIREBASE_AUTH_DOMAIN: sarasva-e25dd.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: sarasva-e25dd
          VITE_FIREBASE_STORAGE_BUCKET: sarasva-e25dd.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1033167676784"
          VITE_FIREBASE_APP_ID: "1:1033167676784:web:9134c434cc4716434ddbb5"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sarasva-frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
