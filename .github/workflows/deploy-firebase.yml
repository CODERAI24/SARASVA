name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sarasva-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sarasva-frontend

      - name: Build (base = / for Firebase root hosting)
        run: npm run build -- --base=/
        working-directory: sarasva-frontend
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCe85WvMIdGqpB4fQ-5l4c46fikr-EwO5s
          VITE_FIREBASE_AUTH_DOMAIN: sarasva-e25dd.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: sarasva-e25dd
          VITE_FIREBASE_STORAGE_BUCKET: sarasva-e25dd.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1033167676784"
          VITE_FIREBASE_APP_ID: "1:1033167676784:web:9134c434cc4716434ddbb5"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: sarasva-e25dd
